name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Vet
        run: go vet ./...

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd agent
          pip install -e ".[dev]"

      - name: Test
        run: |
          cd agent
          python -m pytest tests/ -v --tb=short

      - name: Lint
        run: |
          cd agent
          ruff check src/

      - name: Type check
        run: |
          cd agent
          mypy --strict src/

  integration:
    runs-on: ubuntu-latest
    needs: [go, python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Integration tests
        run: go test -tags integration ./tests/integration/ -v -race -count=1
