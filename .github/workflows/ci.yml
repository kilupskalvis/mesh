name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: test -z "$(gofmt -l . 2>&1)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Mod tidy check
        run: |
          cp go.mod go.mod.bak
          go mod tidy
          diff -q go.mod go.mod.bak > /dev/null 2>&1 || (echo "go.mod is not tidy. Run 'go mod tidy'" && exit 1)

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -count=1

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          cd agent
          uv sync --all-extras

      - name: Lint
        run: |
          cd agent
          uv run ruff check src/ tests/

      - name: Format check
        run: |
          cd agent
          uv run ruff format --check src/ tests/

      - name: Type check
        run: |
          cd agent
          uv run pyright src/

      - name: Test
        run: |
          cd agent
          uv run -- python -m pytest tests/ -v --tb=short

  integration:
    runs-on: ubuntu-latest
    needs: [go, python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Integration tests
        run: go test -tags integration ./tests/integration/ -v -race -count=1
